agent:
    kind: claude
    max_concurrent_agents: 10
    max_concurrent_agents_by_state: {}
    max_retry_backoff_ms: 300000
    max_turns: 20
clarification:
    max_rounds: 5
codex:
    command: codex app-server
    read_timeout_ms: 5000
    stall_timeout_ms: 300000
    turn_timeout_ms: 3600000
execution:
    max_retries: 3
hooks:
    timeout_ms: 60000
polling:
    interval_ms: 30000
tracker:
    active_states:
        - Todo
        - In Progress
    api_key: ""
    endpoint: https://api.linear.app/graphql
    kind: beads
    project_slug: ""
    repo: ""
    terminal_states:
        - Closed
        - Cancelled
        - Canceled
        - Duplicate
        - Done
workspace:
    root: /tmp/symphony_workspaces
