{{ define "dashboard-page" }}
<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Symphony · {{ .Title }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/dashboard.css">
    <style>
    .status-badge-live { display: inline-flex; }
    .status-badge-offline { display: none; }
    body.hx-connected .status-badge-live { display: inline-flex; }
    body.hx-connected .status-badge-offline { display: none; }
    body:not(.hx-connected) .status-badge-live { display: none; }
    body:not(.hx-connected) .status-badge-offline { display: inline-flex; }
    </style>
</head>
<body>
    <main class="app-shell">
        <section class="dashboard-shell" style="min-height: calc(100vh - 3rem);">
            <header class="hero-card">
                <div class="hero-grid">
                    <div>
                        <p class="eyebrow">Symphony Orchestrator</p>
                        <h1 class="hero-title">{{ .Title }}</h1>
                        {{ if .HeroCopy }}<p class="hero-copy">{{ .HeroCopy }}</p>{{ end }}
                    </div>
                    <div class="status-stack">
                        <button type="button" class="create-task-btn" onclick="showCreateModal()" style="display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.5rem 1rem; background: var(--accent); color: white; border: none; border-radius: var(--radius); font-weight: 500; font-size: 0.9rem; cursor: pointer;">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <line x1="12" y1="5" x2="12" y2="19"></line>
                                <line x1="5" y1="12" x2="19" y2="12"></line>
                            </svg>
                            创建需求
                        </button>
                        <span class="status-badge status-badge-live" id="live-indicator">
                            <span class="status-badge-dot"></span>
                            Live
                        </span>
                        <span class="status-badge status-badge-offline">
                            <span class="status-badge-dot"></span>
                            Offline
                        </span>
                    </div>
                </div>
            </header>

            <section class="stage-kanban-container" id="stage-kanban">
                {{ .KanbanHTML }}
            </section>
        </section>
    </main>

    <script src="https://unpkg.com/htmx.org@1.9.10" crossorigin="anonymous"></script>
    <script>
    // SSE 实时更新
    const eventSource = new EventSource('/events');
    let lastTaskCount = null;  // null 表示尚未初始化
    let lastReloadTime = 0;    // 上次刷新时间戳
    let reloadTimeout = null;  // 防抖定时器
    const MIN_RELOAD_INTERVAL = 3000; // 最小刷新间隔 3 秒

    eventSource.addEventListener('state', function(e) {
        document.body.classList.add('hx-connected');
        try {
            const data = JSON.parse(e.data);
            const newCount = (data.counts?.running || 0) + (data.counts?.retrying || 0);
            // 首次收到状态时初始化，不触发刷新
            if (lastTaskCount === null) {
                lastTaskCount = newCount;
            } else if (newCount !== lastTaskCount) {
                lastTaskCount = newCount;
                // 防抖处理：清除之前的定时器
                if (reloadTimeout) {
                    clearTimeout(reloadTimeout);
                }
                // 延迟 500ms 后检查是否可以刷新
                reloadTimeout = setTimeout(function() {
                    const now = Date.now();
                    if (now - lastReloadTime >= MIN_RELOAD_INTERVAL) {
                        lastReloadTime = now;
                        location.reload();
                    }
                }, 500);
            }
        } catch (err) {
            console.error('Failed to parse SSE data:', err);
        }
    });

    eventSource.onerror = function(e) {
        console.error('SSE connection error:', e);
        document.body.classList.remove('hx-connected');
    };

    // ===== 创建需求 Modal 控制 =====

    // 打开 Modal
    function showCreateModal() {
        const modal = document.getElementById('create-task-modal');
        modal.classList.add('active');
        // 重置表单
        document.getElementById('create-task-form').reset();
        document.getElementById('create-result').innerHTML = '';
        // 焦点管理
        setTimeout(function() {
            document.getElementById('task-title').focus();
        }, 100);
        // 禁止 body 滚动
        document.body.style.overflow = 'hidden';
    }

    // 关闭 Modal
    function hideCreateModal() {
        const modal = document.getElementById('create-task-modal');
        const resultEl = document.getElementById('create-result');

        // 检查是否有成功结果
        const hasSuccess = resultEl.innerHTML.includes('success-card') ||
                          resultEl.innerHTML.includes('需求创建成功');

        modal.classList.remove('active');
        // 恢复 body 滚动
        document.body.style.overflow = '';

        // 成功创建后刷新看板
        if (hasSuccess) {
            location.reload();
        }
    }

    // ESC 键关闭
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') {
            const modal = document.getElementById('create-task-modal');
            if (modal && modal.classList.contains('active')) {
                hideCreateModal();
            }
        }
    });

    // HTMX 提交状态管理
    document.body.addEventListener('htmx:beforeRequest', function(e) {
        if (e.detail.pathInfo.requestPath === '/api/tasks') {
            const form = document.getElementById('create-task-form');
            const submitBtn = form.querySelector('.btn-submit');
            if (submitBtn) {
                submitBtn.disabled = true;
                submitBtn.querySelector('.submit-text').style.display = 'none';
                submitBtn.querySelector('.loading-text').style.display = 'inline';
            }
        }
    });

    document.body.addEventListener('htmx:afterRequest', function(e) {
        if (e.detail.pathInfo.requestPath === '/api/tasks') {
            const form = document.getElementById('create-task-form');
            const submitBtn = form.querySelector('.btn-submit');
            if (submitBtn) {
                submitBtn.disabled = false;
                submitBtn.querySelector('.submit-text').style.display = 'inline';
                submitBtn.querySelector('.loading-text').style.display = 'none';
            }

            // 成功响应处理
            if (e.detail.successful) {
                // 3秒后自动关闭并刷新
                setTimeout(function() {
                    hideCreateModal();
                }, 3000);
            }
        }
    });

    // HTMX 错误处理
    document.body.addEventListener('htmx:responseError', function(e) {
        if (e.detail.pathInfo.requestPath === '/api/tasks') {
            const resultEl = document.getElementById('create-result');
            resultEl.innerHTML = '<div class="error-card" style="background: linear-gradient(135deg, rgba(248, 113, 113, 0.1), rgba(248, 113, 113, 0.05)); border: 1px solid rgba(248, 113, 113, 0.3); border-radius: var(--radius-md); padding: 1rem; margin-top: 1rem; color: var(--accent-danger); font-size: 0.85rem;"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color: var(--accent-danger); vertical-align: middle; margin-right: 0.5rem;"><circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line></svg>创建失败: 请检查网络连接或稍后重试</div>';
        }
    });
    </script>

<!-- 创建需求 Modal -->
<div id="create-task-modal" class="create-modal" onclick="if(event.target === this) hideCreateModal()">
    <div class="create-modal-content">
        <!-- Modal 头部 -->
        <div class="modal-header">
            <div class="modal-header-left">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color: var(--accent-running);">
                    <line x1="12" y1="5" x2="12" y2="19"></line>
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                </svg>
                <h3 class="modal-title">创建新需求</h3>
            </div>
            <button type="button" class="modal-close-btn" onclick="hideCreateModal()" aria-label="关闭">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
            </button>
        </div>

        <!-- Modal 内容 -->
        <div class="modal-body">
            <p class="modal-description">创建一个新的需求任务，系统将自动生成 5 个子阶段任务。</p>

            <!-- 表单 -->
            <form id="create-task-form" hx-post="/api/tasks" hx-target="#create-result" hx-swap="innerHTML">
                <div class="form-group">
                    <label for="task-title" class="form-label">需求标题 *</label>
                    <input type="text" id="task-title" name="title" required
                        class="form-input"
                        placeholder="例如：实现用户登录功能">
                </div>

                <div class="form-group">
                    <label for="task-description" class="form-label">需求描述 *</label>
                    <textarea id="task-description" name="description" rows="5" required
                        class="form-textarea"
                        placeholder="详细描述需求的内容、背景和预期结果..."></textarea>
                </div>

                <!-- 子任务预览 -->
                <div class="subtask-preview">
                    <h4 class="subtask-preview-title">将生成的子任务</h4>
                    <ul class="subtask-list">
                        <li><span class="stage-num">1</span>需求澄清</li>
                        <li><span class="stage-num">2</span>BDD 审核</li>
                        <li><span class="stage-num">3</span>架构审核</li>
                        <li><span class="stage-num">4</span>实现</li>
                        <li><span class="stage-num">5</span>验收</li>
                    </ul>
                </div>

                <!-- 结果显示区域 -->
                <div id="create-result"></div>
            </form>
        </div>

        <!-- Modal 底部按钮 -->
        <div class="modal-footer">
            <button type="button" class="btn-cancel" onclick="hideCreateModal()">取消</button>
            <button type="submit" form="create-task-form" class="btn-submit">
                <span class="submit-text">创建需求</span>
                <span class="loading-text" style="display: none;">正在创建...</span>
            </button>
        </div>
    </div>
</div>
</body>
</html>
{{ end }}
